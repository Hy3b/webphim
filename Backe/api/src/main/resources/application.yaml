spring:
  application:
    name: api

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # validate: Hibernate sẽ so sánh các @Entity với bảng thực tế trong DB.
      # Nếu không khớp (thiếu cột, sai kiểu dữ liệu) → app sẽ KHÔNG khởi động.
      # Đây là chế độ an toàn nhất cho môi trường dev/prod khi DB đã được quản lý thủ công.
      # Các tùy chọn khác: create | create-drop | update | none
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    # Tắt defer vì không còn cần chạy data.sql sau khi Hibernate khởi xong
    defer-datasource-initialization: false

  sql:
    init:
      # Tắt hoàn toàn việc tự động chạy file data.sql / schema.sql khi khởi động.
      # Dữ liệu sẽ được lấy trực tiếp từ database (đã có sẵn dữ liệu thật).
      mode: never

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}

# Cấu hình tích hợp SePay
sepay:
  merchant-id: ${SEPAY_MERCHANT_ID}
  secret-key: ${SEPAY_SECRET_KEY}
  bank-account: ${SEPAY_BANK_ACCOUNT}
  bank-name: ${SEPAY_BANK_NAME}
