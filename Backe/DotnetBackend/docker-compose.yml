version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: Cinema_DB
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: webphim
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: webphim-redis
    ports:
      - "6380:6379"
    command: redis-server --requirepass webphim-secret-redis
    volumes:
      - redis_data:/data
    restart: always

volumes:
  mysql_data:
  redis_data:
